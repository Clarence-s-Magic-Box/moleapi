main:
  push:
    - services:
        - docker
      docker:
        image: docker:24.0.9
      stages:
        - name: docker-build-main
          script:
            - export IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            - export BRANCH_TAG="$(echo "${CNB_BRANCH:-unknown}" | tr '/' '-')"
            - export TAG="${BRANCH_TAG}-${CNB_COMMIT_SHORT:-nosha}"
            - docker build -f ./Dockerfile --build-arg COMMIT_SHA="${CNB_COMMIT_SHORT:-nosha}" -t "${IMAGE}:${TAG}" -t "${IMAGE}:main-latest" .
        - name: docker-push-main
          script:
            - export IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            - export BRANCH_TAG="$(echo "${CNB_BRANCH:-unknown}" | tr '/' '-')"
            - export TAG="${BRANCH_TAG}-${CNB_COMMIT_SHORT:-nosha}"
            - docker push "${IMAGE}:${TAG}"
            - docker push "${IMAGE}:main-latest"

production:
  push:
    - services:
        - docker
      docker:
        image: docker:24.0.9
      stages:
        - name: docker-build-production
          script:
            - export IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            - export BRANCH_TAG="$(echo "${CNB_BRANCH:-unknown}" | tr '/' '-')"
            - export TAG="${BRANCH_TAG}-${CNB_COMMIT_SHORT:-nosha}"
            - docker build -f ./Dockerfile --build-arg COMMIT_SHA="${CNB_COMMIT_SHORT:-nosha}" -t "${IMAGE}:${TAG}" -t "${IMAGE}:production-latest" -t "${IMAGE}:latest" .
        - name: docker-push-production
          script:
            - export IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            - export BRANCH_TAG="$(echo "${CNB_BRANCH:-unknown}" | tr '/' '-')"
            - export TAG="${BRANCH_TAG}-${CNB_COMMIT_SHORT:-nosha}"
            - docker push "${IMAGE}:${TAG}"
            - docker push "${IMAGE}:production-latest"
            - docker push "${IMAGE}:latest"
